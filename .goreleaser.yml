version: 2

project_name: allegro

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/allegro
    binary: allegro
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildDate={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore\\(deps\\)"
      - "^docs\\(changelog\\)"

brews:
  - repository:
      owner: allegro-php
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    homepage: "https://github.com/allegro-php/allegro"
    description: "Accelerate PHP Composer installs with a content-addressable store"
    license: MIT
    install: |
      bin.install "allegro"
    test: |
      system "#{bin}/allegro", "--version"
